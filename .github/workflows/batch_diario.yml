name: Batch Diário — Eventos de Pagamento

on:
  schedule:
    - cron: '0 7 * * *'   # todo dia às 07h UTC (04h Brasília)
  workflow_dispatch:

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar batch diário (D-1)
        run: |
          python - << 'EOF'
          import sys
          sys.path.insert(0, 'src')
          from batch_diario import rodar_batch_diario
          stats = rodar_batch_diario()
          print(f"Batch: {stats}")
          EOF

      - name: Retreinar modelo com dados acumulados
        run: |
          python - << 'EOF'
          import sys, os
          sys.path.insert(0, 'src')

          pag_path = 'data/raw/pagamentos_iss.csv'
          if not os.path.exists(pag_path):
              print("Sem pagamentos ainda — modelo não retreinado")
          else:
              import pandas as pd
              n = len(pd.read_csv(pag_path))
              if n < 100:
                  print(f"Aguardando mais dados ({n}/100 pagamentos)")
              else:
                  from feature_engineering import build_features
                  from model_risk import treinar_modelo
                  build_features()
                  _, m, _ = treinar_modelo()
                  print(f"Modelo retreinado — AUC-ROC: {m['auc_roc']}")
          EOF

      - name: Atualizar forecasting e insights
        run: |
          python - << 'EOF'
          import sys, os, json
          sys.path.insert(0, 'src')
          from forecasting import rodar_forecasting
          from insights_engine import InsightsEngine
          rodar_forecasting()
          ins = InsightsEngine().todos_insights()
          with open('data/processed/insights_latest.json','w',encoding='utf-8') as f:
              json.dump(ins, f, ensure_ascii=False, indent=2, default=str)
          print(f"{len(ins)} insights atualizados")
          EOF

      - name: Commit e push (só se houver mudança)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/raw/pagamentos_iss.csv \
            data/raw/declaracoes_iss.csv \
            data/raw/divida_ativa.csv \
            data/raw/.batch_corte \
            data/processed/ \
            models/metricas_modelo.pkl

          if git diff --cached --quiet; then
            echo "Sem mudanças — nada a commitar."
          else
            DIA=$(date +'%Y-%m-%d')
            git commit -m "data(batch): eventos de pagamento — $DIA"
            git push
          fi
