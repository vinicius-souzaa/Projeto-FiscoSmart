name: CI — Validação do Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validar:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar dados históricos commitados
        run: |
          python - << 'EOF'
          import os, sys
          obrigatorios = [
            "data/raw/contribuintes.csv",
            "data/raw/declaracoes_iss.csv",
            "data/raw/imoveis.csv",
            "data/raw/itbi.csv",
            "data/raw/divida_ativa.csv",
            "data/raw/acoes_fiscais.csv",
            "data/raw/cosip_mensal.csv",
            "data/raw/transferencias.csv",
          ]
          faltando = [f for f in obrigatorios if not os.path.exists(f)]
          if faltando:
              print("ERRO — dados históricos ausentes no repositório:")
              [print(f"  {f}") for f in faltando]
              print("\nSolução: rodar python src/generate_data.py e commitar data/raw/")
              sys.exit(1)
          print(f"✓ {len(obrigatorios)} arquivos de dados históricos presentes")
          EOF

      - name: Rodar pipeline analítica (sem regerar dados)
        run: python setup.py

      - name: Validar artefatos gerados
        run: |
          python - << 'EOF'
          import os, sys, joblib, json

          artefatos = [
            "data/processed/features_risco.csv",
            "data/processed/scores_risco.csv",
            "data/processed/shap_values.csv",
            "data/processed/forecast_arrecadacao.csv",
            "data/processed/insights_latest.json",
            "models/modelo_risco.pkl",
            "models/metricas_modelo.pkl",
          ]
          faltando = [f for f in artefatos if not os.path.exists(f)]
          if faltando:
              print("ERRO — artefatos ausentes:"); [print(f"  {f}") for f in faltando]
              sys.exit(1)
          print(f"✓ {len(artefatos)} artefatos gerados")
          EOF

      - name: Validar qualidade do modelo
        run: |
          python - << 'EOF'
          import joblib, sys
          m = joblib.load("models/metricas_modelo.pkl")
          print(f"AUC-ROC: {m['auc_roc']} | Recall: {m['recall']} | F1: {m['f1']}")
          assert m["auc_roc"] >= 0.75, f"AUC-ROC {m['auc_roc']} abaixo do mínimo"
          assert m["recall"]  >= 0.50, f"Recall {m['recall']} abaixo do mínimo"
          print("✓ Modelo dentro dos critérios de qualidade")
          EOF

      - name: Validar integridade dos dados
        run: |
          python - << 'EOF'
          import pandas as pd, json, sys

          # ISS: 36 competências históricas + possíveis novas do batch
          iss = pd.read_csv("data/raw/declaracoes_iss.csv")
          assert iss["competencia"].nunique() >= 36, "Menos de 36 competências no ISS"
          assert (iss["gap_absoluto"] >= 0).all(), "gap_absoluto negativo"
          print(f"✓ ISS: {iss['competencia'].nunique()} competências, {len(iss):,} registros")

          # Scores: distribuição calibrada
          sc = pd.read_csv("data/processed/scores_risco.csv")
          dist = sc["faixa_risco"].value_counts(normalize=True)
          assert dist.get("Baixo",0) < 0.90, "Mais de 90% em Baixo — bins descalibrados"
          assert dist.get("Alto",0)  > 0.03, "Menos de 3% em Alto — bins descalibrados"
          print(f"✓ Scores: Baixo={dist.get('Baixo',0)*100:.0f}% | "
                f"Médio={dist.get('Médio',0)*100:.0f}% | Alto={dist.get('Alto',0)*100:.0f}%")

          # Insights
          with open("data/processed/insights_latest.json") as f:
              ins = json.load(f)
          assert len([i for i in ins if i.get("severidade")=="alta"]) >= 1
          print(f"✓ {len(ins)} insights gerados")
          print("✓ Pipeline OK")
          EOF
