version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# FiscoSmart — Stack local de Engenharia de Dados
# Sobe: PostgreSQL + Airflow (webserver + scheduler) + executa dbt
#
# Como usar:
#   docker-compose up -d
#   Airflow: http://localhost:8080  (admin/admin)
#
# O dashboard Streamlit NÃO faz parte desta stack.
# Para o dashboard: cd ../dashboard && streamlit run app/main.py
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    PYTHONPATH: /opt/airflow/fiscosmart
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./src:/opt/airflow/fiscosmart/src
    - ../dashboard/data:/opt/airflow/fiscosmart/data
    - ../dashboard/models:/opt/airflow/fiscosmart/models
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # PostgreSQL — armazena os dados processados e metadados do Airflow
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  # Airflow — orquestra o pipeline mensal
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin
          --firstname FiscoSmart --lastname Admin
          --role Admin --email admin@fiscosmart.local
      "

volumes:
  postgres-db:
  airflow-logs:
